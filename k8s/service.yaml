# Exposes CodeForge Agents. NodePort makes it reachable at
# localhost:30851 on Rancher Desktop / a local cluster — handy for a
# classroom demo. (Switch to ClusterIP + Ingress for a real cluster.)
apiVersion: v1
kind: Service
metadata:
  name: codeforge-agents
  labels:
    app: codeforge-agents
    team: forge-platform
spec:
  selector:
    app: codeforge-agents
  ports:
    - name: http
      port: 8501
      targetPort: 8501
      nodePort: 30851
  type: NodePort
